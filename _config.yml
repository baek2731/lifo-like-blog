# ==========================================
# 🌐 LIFO-LIKE 글로벌 영문 블로그 코어 세팅
# ==========================================
title: "LIFO-LIKE Tech & Tools"
description: "Global technical guides, gaming strategies, and digital utility toolkits."
url: "https://blog.lifo-like.com"
baseurl: ""
locale: "en-US"

# ==========================================
# 🏗️ 테마 엔진 구성
# ==========================================
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "dark"

# ==========================================
# 🎯 SEO 및 플러그인
# ==========================================
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache
  - jekyll-paginate

# ==========================================
# 🔗 URL 구조
# ==========================================
permalink: /:categories/:title/
paginate: 5
paginate_path: "/page:num/"
timezone: "Asia/Seoul"

# ==========================================
# 👤 저자 정보 (사이드바용)
# ==========================================
author:
  name: "LIFO-LIKE"
  bio: "Global Tech & Gaming Trends, Analyzed."
  location: "Global"
  links:
    - label: "Main Site"
      icon: "fas fa-fw fa-link"
      url: "https://lifo-like.com"

# ==========================================
# 📌 기본 설정
# ==========================================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
      show_date: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false

# ==========================================
# 🗂️ 카테고리 및 태그
# ==========================================
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# ==========================================
# 🔍 검색 기능
# ==========================================
search: false

# ==========================================
# 📜 기타
# ==========================================
owner:
  name: "LIFO-LIKE Admin"
  bio: "Automated Global Tech & Tools Content Platform"
credit: true
footer:
  links:
    - label: "LIFO-LIKE Main"
      url: "https://lifo-like.com"
