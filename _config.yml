title: "LIFO-LIKE Tech & Tools"
description: "Global technical guides, gaming strategies, and digital utility toolkits."
url: "https://blog.lifo-like.com"
baseurl: ""
locale: "en-US"

theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "dark"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache
  - jekyll-paginate

permalink: /:categories/:title/
paginate: 5
paginate_path: "/page:num/"
timezone: "Asia/Seoul"

include:
  - _pages

author:
  name: "LIFO-LIKE"
  bio: "Global Tech & Gaming Trends, Analyzed."
  location: "Global"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
      show_date: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

search: false
