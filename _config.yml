title: "LIFO-LIKE"
description: "Tech and gaming news, analyzed. What's happening and why it matters."
url: "https://blog.lifo-like.com"
baseurl: ""
locale: "en-US"
theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "dark"
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-feed
permalink: /:categories/:title/
paginate: 5
paginate_path: "/page:num/"
timezone: "Asia/Seoul"
include:
  - _pages
author:
  name: "LIFO"
  bio: "Tech and gaming journalist. 10+ years covering CES, E3, and GDC. Writing about the stories that actually matter."
  location: "Global"
  links:
    - label: "Threads"
      icon: "fab fa-fw fa-threads"
      url: "https://www.threads.net/@lifo.like"
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
      show_date: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
search: false
logo: "/favicon.png"
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-5XCQYLVDQY"
    anonymize_ip: false
